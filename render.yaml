# NOTE: the Render service is DASHBOARD-MANAGED — this file has never been
# applied as a Blueprint and Render does not read it. It exists to document
# the real settings so the repo stops carrying deploy fiction (which cost an
# hour at M8 close-out). If these settings change in the dashboard, change
# them here too.
#
# Current reality (M10 launch): web service on STARTER (no idle spin-down)
# + the managed Postgres 18 created at M8. Starter unlocked the pre-deploy
# step, so migrate/seed moved out of the start command (seeds stay
# idempotent fixed-id upserts by design). Custom domain: jgalenti.com
# (DNS at GoDaddy → Render-issued TLS; the onrender.com host stays
# reachable and serves X-Robots-Tag: noindex by the off-canonical guard).

databases:
  - name: portfolio-db
    plan: free
    postgresMajorVersion: '18'

services:
  - type: web
    name: portfolio
    runtime: ruby
    plan: starter
    # No asset pipeline (propshaft skipped) — build assets via Vite directly;
    # `assets:precompile` would fail on its missing `assets:clean` dependency.
    buildCommand: bundle install && npm ci && bin/vite build
    preDeployCommand: bin/rails db:migrate db:seed
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      # /ops basic-auth credential (M9): values are set BY HAND in the
      # dashboard and exist nowhere in this repo. Until both are set, /ops
      # answers 401 to everyone (deny-by-default).
      - key: OPS_USERNAME
        sync: false
      - key: OPS_PASSWORD
        sync: false
      - key: RAILS_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: '2'
