databases:
  - name: portfolio-db
    plan: basic-256mb
    postgresMajorVersion: '16'

services:
  - type: web
    name: portfolio
    runtime: ruby
    plan: starter
    # No asset pipeline (propshaft skipped) — build assets via Vite directly;
    # `assets:precompile` would fail on its missing `assets:clean` dependency.
    buildCommand: bundle install && npm ci && bin/vite build
    preDeployCommand: bin/rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: '2'
