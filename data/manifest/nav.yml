slug: nav
name: Nav (shell + palette)
tier: hero
status: stable
description: Site shell bar with brand, primary navigation, and ⌘K command palette.

variants: {}

props:
  - name: brand
    type: '{ label: string; href: string }'
    description: Brand name and link href. Appears at the nav bar's left edge.
  - name: items
    type: 'readonly NavItem[]'
    description: >-
      Primary navigation links. NavItem: { label: string; href: string; current?: boolean }.
      Set current=true to mark the link with aria-current="page" and the accent underline.
  - name: actions
    type: 'readonly PaletteAction[] | undefined'
    description: >-
      Command palette actions. Presence enables the palette trigger and global ⌘K/Ctrl+K listener.
      PaletteAction: { id: string; label: string; group?: string; keywords?: readonly string[]; perform: () => void }.
  - name: label
    type: 'string'
    default: "'Primary'"
    description: >-
      Accessible name for the nav landmark — must be unique when a page hosts
      more than one Nav (the component doc page itself is the canonical case).
  - name: skipTargetId
    type: 'string'
    default: "'main'"
    description: DOM id of the landmark element the skip link jumps to.
    playground: false
  - name: enableShortcut
    type: 'boolean'
    default: 'true'
    description: >-
      Mount a global ⌘K / Ctrl+K listener to open the palette (when actions
      are provided). Hosts that mount more than one Nav (e.g. a demo page)
      should disable this on all but one instance.
    playground: false
  - name: linkAs
    type: 'ElementType'
    default: "'a'"
    description: >-
      Element type rendered for the brand and item links — pass a router Link
      for client-side navigation. The skip link stays a plain anchor
      (same-document jump). ElementType is not a controllable type so the
      playground auto-skips it.

