overview: |
  Engaged through AIM Consulting as lead UX/UI engineering consultant, I
  redesigned and re-platformed Pivvot's IntegraLink — an infrastructure
  project-mapping platform built on Angular and the Google Maps API.

  I designed the UX and information architecture for dense geospatial workflows,
  then built a custom Angular UI component system to make the mapping interface
  consistent and maintainable.

  The work spanned architecture through implementation: IA, interaction design,
  and a reusable component layer for a complex enterprise mapping product.
highlights:
  - Designed UX + IA for a geospatial infrastructure-mapping platform.
  - Built a custom Angular UI component system on the Google Maps API.
  - Led a product redesign and re-platforming from architecture through code.
